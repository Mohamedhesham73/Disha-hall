<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disha Hall — My Bookings</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- AOS -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
  <!-- Custom -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    body { background: var(--bg); min-height: 100vh; }

    .bookings-wrapper {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 90px;
    }

    /* ── Screen header ── */
    .screen-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--bg-card);
      border-bottom: 1.5px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .screen-header-title {
      font-family: var(--font-heading);
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--black);
    }
    .header-count {
      margin-left: auto;
      background: var(--black);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      border-radius: var(--radius-pill);
      padding: 3px 11px;
      letter-spacing: 0.5px;
    }

    .page-content { padding: 20px; }

    /* ── Tab switcher ── */
    .tab-bar {
      display: flex;
      background: var(--bg-card-alt);
      border-radius: var(--radius-lg);
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      text-align: center;
      padding: 10px 8px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      color: var(--text-muted);
      transition: all var(--transition);
      border: none;
      background: transparent;
      font-family: var(--font-body);
      letter-spacing: 0.3px;
      position: relative;
    }
    .tab-btn.active {
      background: var(--bg-card);
      color: var(--orange);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 800;
      margin-left: 5px;
      vertical-align: middle;
    }
    .tab-btn.active .tab-count {
      background: var(--orange);
      color: #fff;
    }
    .tab-btn:not(.active) .tab-count {
      background: var(--border);
      color: var(--text-muted);
    }

    /* ── Booking card ── */
    .booking-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0;
      margin-bottom: 12px;
      overflow: hidden;
      transition: all var(--transition);
    }
    .booking-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    }

    /* Court SVG strip on top of each card */
    .card-court-strip {
      background: #FFF8F5;
      border-bottom: 1.5px solid var(--border);
      padding: 0 16px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .card-court-strip.taken-strip { background: var(--bg-card-alt); }
    .card-court-strip.cancelled-strip { background: var(--bg-card-alt); }

    .strip-court-svg { width: 120px; flex-shrink: 0; }

    .strip-right { flex: 1; text-align: right; }
    .strip-court-num {
      font-family: var(--font-heading);
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--black);
      line-height: 1;
    }
    .strip-court-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ── Card body ── */
    .card-body-inner { padding: 14px 16px; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      gap: 8px;
    }

    .card-datetime {
      font-size: 14px;
      font-weight: 800;
      color: var(--black);
      line-height: 1.3;
    }
    .card-duration {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-soft);
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-price {
      font-family: var(--font-heading);
      font-size: 20px;
      color: var(--orange);
      letter-spacing: 1px;
    }
    .card-cancelled .card-price { color: var(--text-muted); }

    .card-ref {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ── Cancel button states ── */
    .cancel-btn {
      background: transparent;
      border: 1.5px solid rgba(229,57,53,0.3);
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .cancel-btn:hover:not(:disabled) {
      background: rgba(229,57,53,0.07);
      border-color: var(--danger);
    }
    .cancel-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: var(--border);
      color: var(--text-muted);
    }

    /* ── Countdown timer on cancel btn ── */
    .countdown-tag {
      font-size: 10px;
      color: var(--warning);
      font-weight: 700;
      background: rgba(245,166,35,0.1);
      border: 1px solid rgba(245,166,35,0.25);
      border-radius: var(--radius-pill);
      padding: 2px 8px;
      white-space: nowrap;
    }

    /* ── Status badges ── */
    .badge-upcoming   { background: rgba(255,107,53,0.1);  color: var(--orange);  border: 1px solid rgba(255,107,53,0.25); }
    .badge-completed  { background: rgba(26,26,26,0.07);   color: var(--text-muted); border: 1px solid rgba(26,26,26,0.1); }
    .badge-cancelled  { background: rgba(229,57,53,0.08);  color: var(--danger);  border: 1px solid rgba(229,57,53,0.18); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      background: var(--bg-card);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-lg);
    }
    .empty-icon  { font-size: 42px; margin-bottom: 12px; }
    .empty-title { font-family: var(--font-heading); font-size: 20px; letter-spacing: 1px; color: var(--black); margin-bottom: 6px; }
    .empty-sub   { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card-alt) 25%, var(--border) 50%, var(--bg-card-alt) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-lg);
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Summary stats bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .stats-bar-item {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 8px;
      text-align: center;
    }
    .stats-bar-val {
      font-family: var(--font-heading);
      font-size: 22px;
      color: var(--black);
      letter-spacing: 1px;
    }
    .stats-bar-val.accent { color: var(--orange); }
    .stats-bar-lbl { font-size: 10px; color: var(--text-muted); font-weight: 700; margin-top: 2px; }

    /* ── Bottom nav ── */
    .bottom-nav {
      display: flex;
      background: var(--bg-card);
      border-top: 1.5px solid var(--border);
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      max-width: 480px;
      margin: 0 auto;
    }
    .bnav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 10px 8px 8px;
      cursor: pointer; text-decoration: none;
    }
    .bnav-icon  { font-size: 20px; margin-bottom: 3px; }
    .bnav-label { font-size: 10px; font-weight: 700; color: var(--text-muted); }
    .bnav-item.active .bnav-label,
    .bnav-item:hover  .bnav-label { color: var(--orange); }

    /* ── Cancel confirm modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 28px 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      animation: modal-pop 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modal-pop {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal-icon  { font-size: 40px; margin-bottom: 14px; }
    .modal-title { font-family: var(--font-heading); font-size: 22px; letter-spacing: 2px; color: var(--black); margin-bottom: 8px; }
    .modal-desc  { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; }
  </style>
</head>

<script>
// ── Firebase ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyARzYhxPxi0qy3P_QHFDEF1yEaI1alROJQ",
  authDomain: "disha-hall.firebaseapp.com",
  projectId: "disha-hall",
  storageBucket: "disha-hall.firebasestorage.app",
  messagingSenderId: "187326753268",
  appId: "1:187326753268:web:369113558f07686ba5b1a1"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

AOS.init({ once: true, easing: 'ease-out-cubic' });

// ── State ─────────────────────────────────────────────────
let activeTab        = 'upcoming';
let pendingCancelId  = null;
let pendingCancelBtn = null;
let allBookings      = { upcoming: [], past: [], cancelled: [] };

// ── Build mini court SVG for card strip ───────────────────
function buildMiniStripSVG(num, status) {
  const lineColor = status === 'upcoming' ? '#FF6B35' : '#AAAAAA';
  const opacity   = status === 'upcoming' ? '0.7' : '0.4';
  const netColor  = status === 'upcoming' ? '#1A1A1A' : '#AAAAAA';
  const netOp     = status === 'upcoming' ? '0.8' : '0.35';

  return `<svg viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
    <rect x="0" y="0" width="120" height="70" fill="transparent"/>
    <rect x="4" y="4" width="112" height="62" fill="none" stroke="${lineColor}" stroke-width="1.5" opacity="${opacity}"/>
    <line x1="16" y1="4"  x2="16" y2="66" stroke="${lineColor}" stroke-width="1" opacity="${opacity}"/>
    <line x1="104" y1="4" x2="104" y2="66" stroke="${lineColor}" stroke-width="1" opacity="${opacity}"/>
    <line x1="4" y1="35" x2="116" y2="35" stroke="${netColor}" stroke-width="2" opacity="${netOp}"/>
    <circle cx="16"  cy="35" r="2" fill="${netColor}" opacity="${netOp}"/>
    <circle cx="104" cy="35" r="2" fill="${netColor}" opacity="${netOp}"/>
    <line x1="4" y1="22" x2="116" y2="22" stroke="${lineColor}" stroke-width="0.8" opacity="${opacity}"/>
    <line x1="4" y1="48" x2="116" y2="48" stroke="${lineColor}" stroke-width="0.8" opacity="${opacity}"/>
    <line x1="60" y1="4"  x2="60" y2="35" stroke="${lineColor}" stroke-width="0.8" opacity="${opacity}"/>
    <line x1="60" y1="35" x2="60" y2="66" stroke="${lineColor}" stroke-width="0.8" opacity="${opacity}"/>
    <text x="60" y="35" text-anchor="middle" dominant-baseline="middle"
          font-family="'Bebas Neue',sans-serif" font-size="22"
          fill="${lineColor}" opacity="0.18">${num}</text>
  </svg>`;
}

// ── Format date ───────────────────────────────────────────
function formatDate(dateStr) {
  const d     = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff  = Math.round((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

// ── Can cancel? ───────────────────────────────────────────
function minutesUntilStart(date, startTime) {
  const isPM  = startTime.includes('PM');
  let [h, m]  = startTime.replace(' AM','').replace(' PM','').split(':').map(Number);
  if (isPM && h !== 12) h += 12;
  if (!isPM && h === 12) h = 0;
  const start = new Date(date + 'T' + String(h).padStart(2,'0') + ':' + String(m || 0).padStart(2,'0') + ':00');
  return (start - new Date()) / 60000;
}

// ── Build booking card ────────────────────────────────────
function buildCard(id, b, type) {
  const card = document.createElement('div');
  card.className = 'booking-card' + (type === 'cancelled' ? ' card-cancelled' : '');

  const stripClass = type === 'upcoming' ? '' : (type === 'cancelled' ? ' cancelled-strip' : ' taken-strip');
  const minsLeft   = type === 'upcoming' ? minutesUntilStart(b.date, b.startTime) : 0;
  const canCancel  = type === 'upcoming' && minsLeft > 30;
  const almostLate = type === 'upcoming' && minsLeft > 0 && minsLeft <= 60;

  let badgeClass = 'badge-upcoming';
  let badgeText  = 'Upcoming';
  if (type === 'past')      { badgeClass = 'badge-completed'; badgeText = 'Completed'; }
  if (type === 'cancelled') { badgeClass = 'badge-cancelled'; badgeText = 'Cancelled'; }

  let cancelHtml = '';
  if (type === 'upcoming') {
    if (canCancel) {
      cancelHtml = almostLate
        ? `<button class="cancel-btn" onclick="openModal('${id}', this)">Cancel</button>
           <span class="countdown-tag">⚠ ${Math.floor(minsLeft)}m left to cancel</span>`
        : `<button class="cancel-btn" onclick="openModal('${id}', this)">Cancel Booking</button>`;
    } else if (minsLeft > 0) {
      cancelHtml = `<button class="cancel-btn" disabled title="Cannot cancel less than 30 min before">Too Late to Cancel</button>`;
    } else {
      cancelHtml = `<span class="countdown-tag" style="background:rgba(26,26,26,0.06);border-color:rgba(26,26,26,0.1);color:var(--text-muted);">In Progress</span>`;
    }
  }

  card.innerHTML = `
    <div class="card-court-strip${stripClass}">
      <div class="strip-court-svg">
        ${buildMiniStripSVG(b.courtNumber, type === 'upcoming' ? 'upcoming' : 'past')}
      </div>
      <div class="strip-right">
        <div class="strip-court-num">Court ${b.courtNumber}</div>
        <div class="strip-court-label">Disha Hall</div>
      </div>
    </div>
    <div class="card-body-inner">
      <div class="card-top">
        <div>
          <div class="card-datetime">${formatDate(b.date)} &nbsp;·&nbsp; ${b.startTime} – ${b.endTime}</div>
          <div class="card-duration">${b.hours} hour${b.hours > 1 ? 's' : ''} &nbsp;·&nbsp; Ref: ${b.reference || '—'}</div>
        </div>
        <span class="badge ${badgeClass}" style="white-space:nowrap;flex-shrink:0;">${badgeText}</span>
      </div>
      <div class="card-bottom">
        <div class="card-price">${type === 'cancelled' ? '<span style="text-decoration:line-through;opacity:0.5;">' + b.totalPrice + ' EGP</span>' : b.totalPrice + ' EGP'}</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          ${cancelHtml}
        </div>
      </div>
    </div>`;

  return card;
}

// ── Switch tab ────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  ['upcoming','past','cancelled'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('list-' + t).style.display = t === tab ? 'block' : 'none';
  });
}

// ── Render all booking lists ──────────────────────────────
function renderAll() {
  const today = new Date().toISOString().split('T')[0];

  let upcomingCount = 0, pastCount = 0, cancelCount = 0, totalSpent = 0;

  ['upcoming','past','cancelled'].forEach(type => {
    const container = document.getElementById('list-' + type);
    container.innerHTML = '';
  });

  allBookings.upcoming.forEach((item, i) => {
    const el = buildCard(item.id, item.data, 'upcoming');
    el.setAttribute('data-aos', 'fade-up');
    el.setAttribute('data-aos-delay', String(i * 60));
    document.getElementById('list-upcoming').appendChild(el);
    upcomingCount++;
  });

  allBookings.past.forEach((item, i) => {
    const el = buildCard(item.id, item.data, 'past');
    el.setAttribute('data-aos', 'fade-up');
    el.setAttribute('data-aos-delay', String(i * 60));
    document.getElementById('list-past').appendChild(el);
    pastCount++;
    totalSpent += item.data.totalPrice || 0;
  });

  allBookings.cancelled.forEach((item, i) => {
    const el = buildCard(item.id, item.data, 'cancelled');
    el.setAttribute('data-aos', 'fade-up');
    el.setAttribute('data-aos-delay', String(i * 60));
    document.getElementById('list-cancelled').appendChild(el);
    cancelCount++;
  });

  // Empty states
  if (!upcomingCount) {
    document.getElementById('list-upcoming').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📅</div>
        <div class="empty-title">NO UPCOMING BOOKINGS</div>
        <div class="empty-sub">You don't have any upcoming court reservations.</div>
        <a href="book.html" class="btn btn-primary" style="width:auto;padding:11px 28px;">Book a Court</a>
      </div>`;
  }
  if (!pastCount) {
    document.getElementById('list-past').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏸</div>
        <div class="empty-title">NO PAST BOOKINGS</div>
        <div class="empty-sub">Your completed sessions will appear here.</div>
      </div>`;
  }
  if (!cancelCount) {
    document.getElementById('list-cancelled').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✅</div>
        <div class="empty-title">NO CANCELLATIONS</div>
        <div class="empty-sub">You haven't cancelled any bookings.</div>
      </div>`;
  }

  // Update counts
  document.getElementById('count-upcoming').textContent  = upcomingCount;
  document.getElementById('count-past').textContent      = pastCount;
  document.getElementById('count-cancelled').textContent = cancelCount;
  document.getElementById('header-count').textContent    = upcomingCount + pastCount + cancelCount;
  document.getElementById('stat-upcoming').textContent   = upcomingCount;
  document.getElementById('stat-completed').textContent  = pastCount;
  document.getElementById('stat-spent').textContent      = totalSpent || '0';

  AOS.refresh();
}

// ── Load bookings from Firestore ──────────────────────────
function loadBookings(uid) {
  const today = new Date().toISOString().split('T')[0];

  db.collection('bookings')
    .where('playerId', '==', uid)
    .orderBy('date', 'desc')
    .orderBy('startTime', 'desc')
    .onSnapshot(snap => {
      allBookings = { upcoming: [], past: [], cancelled: [] };

      snap.docs.forEach(doc => {
        const b    = doc.data();
        const item = { id: doc.id, data: b };

        if (b.status === 'cancelled') {
          allBookings.cancelled.push(item);
        } else if (b.date >= today) {
          allBookings.upcoming.push(item);
        } else {
          allBookings.past.push(item);
        }
      });

      // Sort upcoming by soonest first
      allBookings.upcoming.sort((a,b) => a.data.date.localeCompare(b.data.date));
      // Sort past by most recent first
      allBookings.past.sort((a,b) => b.data.date.localeCompare(a.data.date));

      renderAll();
    });
}

// ── Cancel modal ──────────────────────────────────────────
function openModal(bookingId, btn) {
  pendingCancelId  = bookingId;
  pendingCancelBtn = btn;
  document.getElementById('cancel-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('cancel-modal').classList.remove('show');
  pendingCancelId  = null;
  pendingCancelBtn = null;
}

async function executCancel() {
  if (!pendingCancelId) return;

  const confirmBtn = document.getElementById('modal-confirm-btn');
  confirmBtn.disabled     = true;
  confirmBtn.textContent  = 'Cancelling...';

  try {
    await db.collection('bookings').doc(pendingCancelId).update({
      status: 'cancelled',
      cancelledAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    closeModal();
    switchTab('cancelled');
  } catch (err) {
    console.error(err);
    confirmBtn.disabled    = false;
    confirmBtn.textContent = 'Yes, Cancel';
  }
}

// ── Close modal on overlay click ──────────────────────────
document.getElementById('cancel-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Auth gate ─────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (!user) { window.location.href = 'signup.html'; return; }
  loadBookings(user.uid);
});
</script>
